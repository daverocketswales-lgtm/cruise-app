<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cruise Tracker</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }

.header {
  background:#003B7A;
  color:white;
  text-align:center;
  padding:40px 20px;
}

.ship {
  width:220px;
  height:90px;
  background:white;
  margin:30px auto;
  border-radius:10px 10px 40px 40px;
  position:relative;
}
.ship:before {
  content:'';
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%);
  width:100px;
  height:25px;
  background:white;
  border-radius:5px;
}

.content {
  background:white;
  margin-top:-20px;
  padding:20px;
  border-radius:20px 20px 0 0;
}

.btn {
  display:block;
  background:#003B7A;
  color:white;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  text-align:center;
  cursor:pointer;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="header">
    <h1>PRINCESS CRUISES</h1>
    <div class="ship"></div>
  </div>

  <div class="content">
    <h2>Welcome Aboard!</h2>
    <p>Track your onboard spending and compare packages.</p>

    <div class="btn" onclick="goSetup()">Setup New Cruise</div>
  </div>
</div>

<!-- SETUP -->
<div id="setup" class="hidden">
  <div class="header">
    <h1>Setup Cruise</h1>
  </div>

  <div class="content">
    <p>This is your setup page (we will expand this next).</p>
    <div class="btn" onclick="goTracking()">Continue</div>
    <div class="btn" onclick="goHome()">Back</div>
  </div>
</div>

<!-- TRACKING -->
<div id="tracking" class="hidden">
  <div class="header">
    <h1>Daily Tracking</h1>
  </div>

  <div class="content">
    <p>Tap item (example):</p>

    <div class="btn" onclick="addItem()">Add Drink ($10)</div>

    <p id="total">Total: $0</p>

    <div class="btn" onclick="goSummary()">End Day</div>
  </div>
</div>

<!-- SUMMARY -->
<div id="summary" class="hidden">
  <div class="header">
    <h1>Day Summary</h1>
  </div>

  <div class="content">
    <p id="finalTotal"></p>

    <div class="btn" onclick="goHome()">Back to Start</div>
  </div>
</div>

<script>
let total = 0;

function goSetup(){
  show("setup");
}
function goTracking(){
  show("tracking");
}
function goSummary(){
  document.getElementById("finalTotal").innerText = "You spent $" + total;
  show("summary");
}
function goHome(){
  show("home");
}

function show(id){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("setup").classList.add("hidden");
  document.getElementById("tracking").classList.add("hidden");
  document.getElementById("summary").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

function addItem(){
  total += 10;
  document.getElementById("total").innerText = "Total: $" + total;
}
</script>

</body>
</html>
